name: Daily Demand Mining

on:
  schedule:
    # 08:00 Beijing time
    - cron: "0 0 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-demand-mining.yml"
      - "scripts/**"
      - "README.md"
      - "docs/**"
      - "templates/**"
      - ".env.example"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect demand signals
        run: python scripts/collect_daily.py

      - name: Build static site
        run: python scripts/build_daily_site.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Compute today page URL
        id: today
        run: |
          TODAY="$(TZ=Asia/Shanghai date +%F)"
          echo "date=$TODAY" >> "$GITHUB_OUTPUT"
          echo "url=${{ steps.deployment.outputs.page_url }}daily/$TODAY.html" >> "$GITHUB_OUTPUT"

      - name: Push daily report with WeChat test account
        env:
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          WECHAT_OPENID: ${{ secrets.WECHAT_OPENID }}
          WECHAT_TEMPLATE_ID: ${{ secrets.WECHAT_TEMPLATE_ID }}
          WECHAT_DETAIL_URL: ${{ steps.today.outputs.url }}
        run: |
          if [ -n "$WECHAT_APP_ID" ] && [ -n "$WECHAT_APP_SECRET" ] && [ -n "$WECHAT_OPENID" ] && [ -n "$WECHAT_TEMPLATE_ID" ]; then
            node scripts/wechat_test_push.js
          else
            echo "WeChat test account secrets are incomplete; skip WeChat push."
          fi

      - name: Commit daily report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily data site
          if git diff --cached --quiet; then
            echo "No daily changes to commit."
          else
            git commit -m "daily: add opportunities $(TZ=Asia/Shanghai date +%F)"
            git push
          fi
